<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Tools</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Tools">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  body { font-family: Arial, sans-serif; background: #181824; color: #dde1f0; }
  .shot-in { background: #001f3f; color: white; padding: 10px; cursor: pointer; }
  .shot-out { background: #FF4136; color: white; padding: 10px; cursor: pointer; }
</style>
</head>
<body>

<!-- Shot In/Out Button -->
<button id="shotButton" class="shot-in">Shot In</button>
<script>
  const shotButton = document.getElementById("shotButton");
  
  shotButton.addEventListener("click", () => {
      if (shotButton.classList.contains("shot-in")) {
          // Switch to Shot Out state
          shotButton.classList.remove("shot-in");
          shotButton.classList.add("shot-out");
          shotButton.textContent = "Shot Out";
          document.body.style.background = "#FF4136"; // Red background
      } else {
          // Switch to Shot In state
          shotButton.classList.remove("shot-out");
          shotButton.classList.add("shot-in");
          shotButton.textContent = "Shot In";
          document.body.style.background = "#001f3f"; // Dark Blue background
      }
  });

  // Play Rows One by One Automatically
  const rows = []; // Add your rows data here
  let currentRow = 0;

  function playNextRow() {
      if (currentRow < rows.length) {
          const row = rows[currentRow];
          if (row.remainingTime > 0) {
              console.log(`Playing row: ${currentRow}`);
              // Your logic to play row
          }
          currentRow++;
          setTimeout(playNextRow, 1000); // Adjust delay as needed
      }
  }

  playNextRow();
</script>

</body>
</html>
